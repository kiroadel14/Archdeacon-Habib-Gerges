<script>
  // إعادة السماح بظهور intro عند تشغيل الموقع من جديد
  Object.keys(localStorage).forEach(key => {
    if (key.startsWith("introSeen_path_")) {
      localStorage.removeItem(key);
    }
    if (key.startsWith("firstCharacterChosen_path_")) {
      localStorage.removeItem(key);
    }
  });
</script>
