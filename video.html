<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الفيديو </title>

<style>
body{
    background: linear-gradient(135deg,#0f0f0f,#1c1c1c);
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:#1a1a1a;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,0.7);
    width:420px;
}

h1{
    margin-bottom:20px;
    font-size:28px;
}

p{
    color:#ccc;
    margin-bottom:30px;
}

button{
    padding:14px 30px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#e63946;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff4d5a;
    transform:scale(1.05);
}

.icon{
    font-size:60px;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="icon">🎬</div>

<h1>ياترا مين؟</h1>

<p>
كدا انت وصلت للنهايه اتفرج علي الفديو يمكن يفيدك عشان تعرف مين القاتل<br>
</p>

<a href="https://drive.google.com/your-video-link" target="_blank">
<button>مشاهدة الفيديو</button>
</a>

</div>

</body>
</html>
